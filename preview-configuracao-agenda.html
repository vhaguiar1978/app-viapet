<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Configurar Agenda</title>
    <style>
      body{margin:0;font-family:"Segoe UI",Tahoma,sans-serif;background:rgba(0,0,0,.18)}
      .modal{width:1100px;min-height:700px;margin:18px auto;padding:22px 36px 30px;border-radius:10px;background:#fff;border:1px solid #e8ddf1;display:grid;gap:22px}
      h1{margin:12px 0 0;font-size:48px;font-weight:500}
      .tabs{display:inline-flex;border:1px solid #e8ddf1;border-radius:8px;overflow:hidden;background:#f6f1fb;width:fit-content}
      .tab{min-height:54px;padding:0 28px;display:inline-flex;align-items:center;border-right:1px solid #e8ddf1;color:#7a7184;font-size:18px}
      .tab.active{background:#fff;box-shadow:inset 0 -3px 0 #4aa255;color:#444}
      .row{display:grid;grid-template-columns:minmax(0,520px);gap:18px}
      .row2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
      .field{min-height:54px;padding:8px 14px;border:1px solid #d8cfdf;border-radius:8px;background:#fff;display:grid;align-content:center}
      .field small{color:#8c8196;font-size:11px}
      .field span{font-size:18px}
      .card{padding:18px;border:1px solid #d8cfdf;border-radius:8px;display:grid;gap:16px}
      .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 26px}
      .status{display:flex;align-items:center;gap:10px}
      .check{width:24px;height:24px;border-radius:4px;background:#49a34e;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-weight:700}
      .pill{min-width:220px;min-height:42px;padding:0 16px;border-radius:4px;display:inline-flex;align-items:center;font-size:18px}
      .footer{display:flex;justify-content:flex-end}
      .green{min-height:54px;padding:0 34px;border-radius:4px;background:#49a34e;color:#fff;border:0;font-size:20px;font-weight:700}
    </style>
  </head>
  <body>
    <div class="modal">
      <h1>Configurar</h1>
      <div class="tabs"><span class="tab">Perfil</span><span class="tab">Recursos</span><span class="tab active">Agenda</span><span class="tab">Impressão</span><span class="tab">Conta</span></div>
      <div class="row"><div class="field"><small>Dias Trabalhados</small><span>Segunda a Sábado</span></div></div>
      <div class="row2"><div class="field"><small>Eventos Estética</small><span>A cada 1 hora</span></div><div class="field"><small>Eventos Clínica</small><span>A cada 1 hora</span></div></div>
      <section class="card">
        <strong>Etiquetas de Situação</strong>
        <div class="grid">
          <div class="status"><span class="check">✓</span><span class="pill" style="background:#fff200;color:#1d1d1d">Aguardando</span></div>
          <div class="status"><span class="check">✓</span><span class="pill" style="background:#ff910d;color:#fff">Fazendo</span></div>
          <div class="status"><span class="check">✓</span><span class="pill" style="background:#33d12a;color:#1d1d1d">Secando</span></div>
          <div class="status"><span class="check">✓</span><span class="pill" style="background:#007a00;color:#fff">Pronto</span></div>
          <div class="status"><span class="check">✓</span><span class="pill" style="background:#2c8ff1;color:#fff">Entregue</span></div>
          <div class="status"><span class="check">✓</span><span class="pill" style="background:#1e17ff;color:#fff">Refazer</span></div>
          <div class="status"><span class="check">✓</span><span class="pill" style="background:#fb1714;color:#fff">Atrasado</span></div>
          <div class="status"><span class="check">✓</span><span class="pill" style="background:#9f0300;color:#fff">Encaixe</span></div>
          <div class="status"><span class="check">✓</span><span class="pill" style="background:#000;color:#fff">Atenção</span></div>
        </div>
      </section>
      <div class="footer"><button class="green">Fechar</button></div>
    </div>
  </body>
</html>
