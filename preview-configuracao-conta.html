<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Configurar Conta</title>
    <style>
      body{margin:0;font-family:"Segoe UI",Tahoma,sans-serif;background:rgba(0,0,0,.18)}
      .modal{width:1100px;min-height:700px;margin:18px auto;padding:22px 36px 30px;border-radius:10px;background:#fff;border:1px solid #e8ddf1;display:grid;gap:22px}
      h1{margin:12px 0 0;font-size:48px;font-weight:500}
      .tabs{display:inline-flex;border:1px solid #e8ddf1;border-radius:8px;overflow:hidden;background:#f6f1fb;width:fit-content}
      .tab{min-height:54px;padding:0 28px;display:inline-flex;align-items:center;border-right:1px solid #e8ddf1;color:#7a7184;font-size:18px}
      .tab.active{background:#fff;box-shadow:inset 0 -3px 0 #4aa255;color:#444}
      .stack{display:grid;gap:18px}
      .row{display:grid;grid-template-columns:1fr auto;gap:18px;align-items:center}
      .row2{display:grid;grid-template-columns:minmax(0,360px);gap:18px}
      .row3{display:grid;grid-template-columns:1fr 170px;gap:18px}
      .field{min-height:54px;padding:8px 14px;border:1px solid #d8cfdf;border-radius:8px;background:#fff;display:grid;align-content:center}
      .field small{color:#8c8196;font-size:11px}
      .field span{font-size:18px}
      .soft{min-height:46px;padding:0 24px;border-radius:4px;background:#6c8595;color:#fff;border:0;font-size:18px;font-weight:700}
      .card{padding:18px;border:1px solid #d8cfdf;border-radius:8px;display:grid;grid-template-columns:1fr auto;gap:16px;align-items:center}
      .valid{margin:12px 0 0;font-size:20px;font-weight:600}
      .actions{display:grid;gap:12px;justify-items:end;color:#8a8790;font-size:18px}
      .footer{display:flex;justify-content:flex-end}
      .green{min-height:54px;padding:0 34px;border-radius:4px;background:#49a34e;color:#fff;border:0;font-size:20px;font-weight:700}
    </style>
  </head>
  <body>
    <div class="modal">
      <h1>Configurar</h1>
      <div class="tabs"><span class="tab">Perfil</span><span class="tab">Recursos</span><span class="tab">Agenda</span><span class="tab">Impressão</span><span class="tab active">Conta</span></div>
      <div class="stack">
        <div class="row"><div class="field"><small>Titular/Estabelecimento</small><span>Pet Shop Dog House</span></div><button class="soft">Alterar</button></div>
        <div class="row2"><div class="field"><small>Nomenclatura</small><span>Pet e Responsável</span></div></div>
        <div class="row3"><div class="field"><small>Email de Contato</small><span></span></div><div class="field"><small>DDD Fone</small><span>11</span></div></div>
        <section class="card">
          <div><strong>Validade do VetBase</strong><div class="valid">Válido até: 16.04.2026</div></div>
          <div class="actions"><button class="soft">Renovar</button><span>Ver Termos do Contrato</span></div>
        </section>
      </div>
      <div class="footer"><button class="green">Fechar</button></div>
    </div>
  </body>
</html>
