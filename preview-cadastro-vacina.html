<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ViaPet Nova Vacina</title>
    <style>
      :root {
        --line: #e8ddf1;
        --text: #2f2835;
        --muted: #786f84;
        --shadow: 0 24px 60px rgba(77, 53, 110, 0.14);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, sans-serif;
        background: linear-gradient(180deg, #f7f1fb 0%, #f3edf8 100%);
        color: var(--text);
      }
      .page {
        max-width: 900px;
        margin: 0 auto;
        padding: 24px;
      }
      .card {
        padding: 22px;
        border-radius: 20px;
        background: white;
        border: 1px solid var(--line);
        box-shadow: var(--shadow);
        display: grid;
        gap: 18px;
      }
      .head, .footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }
      .kicker {
        display: inline-flex;
        min-height: 28px;
        padding: 0 10px;
        align-items: center;
        border-radius: 999px;
        background: #f2ebfc;
        color: #6f4fa2;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
      }
      h1 {
        margin: 8px 0 0;
        font-size: 24px;
      }
      .ghost {
        min-height: 44px;
        padding: 0 16px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: white;
        color: #5d5370;
        display: inline-flex;
        align-items: center;
        text-decoration: none;
        font-weight: 700;
      }
      .field {
        display: grid;
        gap: 6px;
      }
      .field label {
        font-size: 12px;
        color: var(--muted);
      }
      .input, .textarea {
        min-height: 48px;
        padding: 0 12px;
        border-radius: 12px;
        border: 1px solid #dad1e3;
        background: white;
        display: flex;
        align-items: center;
        font-size: 14px;
      }
      .textarea {
        min-height: 96px;
        padding: 12px;
        align-items: flex-start;
        line-height: 1.6;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 220px;
        gap: 12px;
      }
      .btn {
        min-width: 120px;
        min-height: 46px;
        border-radius: 12px;
        border: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        background: #4ca74c;
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="card">
        <div class="head">
          <div>
            <span class="kicker">Cadastro vacina</span>
            <h1>Novo Tipo de Vacina</h1>
          </div>
          <a class="ghost" href="./preview-cadastros.html">Voltar</a>
        </div>

        <div class="field">
          <label>Nome</label>
          <div class="input">V10 Importada</div>
        </div>

        <div class="grid">
          <div class="field">
            <label>Laboratorio</label>
            <div class="input">Zoetis</div>
          </div>
          <div class="field">
            <label>Dose padrao</label>
            <div class="input">1 ml</div>
          </div>
        </div>

        <div class="grid">
          <div class="field">
            <label>Intervalo de reforco</label>
            <div class="input">21 dias</div>
          </div>
          <div class="field">
            <label>Validade apos abertura</label>
            <div class="input">Imediata</div>
          </div>
        </div>

        <div class="field">
          <label>Observacoes</label>
          <div class="textarea">Vacina de protocolo inicial. Recomendar reforco conforme calendario vacinal e manter sob refrigeracao.</div>
        </div>

        <div class="footer" style="justify-content:flex-end;">
          <div class="btn">Fechar</div>
        </div>
      </div>
    </div>
  </body>
  </html>
