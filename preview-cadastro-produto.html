<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ViaPet Novo Produto</title>
    <style>
      :root {
        --line: #e8ddf1;
        --text: #2f2835;
        --muted: #786f84;
        --shadow: 0 24px 60px rgba(77, 53, 110, 0.14);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, sans-serif;
        background: linear-gradient(180deg, #f7f1fb 0%, #f3edf8 100%);
        color: var(--text);
      }
      .page {
        max-width: 1260px;
        margin: 0 auto;
        padding: 24px;
      }
      .card {
        padding: 22px;
        border-radius: 20px;
        background: white;
        border: 1px solid var(--line);
        box-shadow: var(--shadow);
        display: grid;
        gap: 18px;
      }
      .head, .footer, .actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }
      .kicker {
        display: inline-flex;
        min-height: 28px;
        padding: 0 10px;
        align-items: center;
        border-radius: 999px;
        background: #f2ebfc;
        color: #6f4fa2;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
      }
      h1 {
        margin: 8px 0 0;
        font-size: 24px;
      }
      .ghost {
        min-height: 44px;
        padding: 0 16px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: white;
        color: #5d5370;
        display: inline-flex;
        align-items: center;
        text-decoration: none;
        font-weight: 700;
      }
      .main, .section {
        display: grid;
        gap: 12px;
      }
      .section h3 {
        margin: 6px 0 0;
        color: #42a04f;
        font-size: 17px;
      }
      .grid {
        display: grid;
        gap: 12px;
      }
      .grid-top {
        grid-template-columns: minmax(0, 1.2fr) 140px minmax(220px, 0.7fr);
        align-items: end;
      }
      .grid-two {
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      }
      .grid-stock {
        grid-template-columns: 160px 160px;
      }
      .grid-four {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
      .grid-bottom {
        grid-template-columns: 180px minmax(0, 1fr);
        align-items: end;
      }
      .field {
        display: grid;
        gap: 6px;
      }
      .field label {
        font-size: 12px;
        color: var(--muted);
      }
      .input {
        min-height: 48px;
        padding: 0 12px;
        border-radius: 12px;
        border: 1px solid #dad1e3;
        background: white;
        display: flex;
        align-items: center;
        font-size: 14px;
      }
      .inline-check {
        min-height: 46px;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: #43384d;
        font-weight: 600;
      }
      .box {
        width: 22px;
        height: 22px;
        border-radius: 4px;
        border: 1px solid #bdb0cb;
        background: white;
      }
      .btn {
        min-width: 120px;
        min-height: 46px;
        border-radius: 12px;
        border: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: 700;
        background: #4ca74c;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="card">
        <div class="head">
          <div>
            <span class="kicker">Cadastro produto</span>
            <h1>Novo Produto</h1>
          </div>
          <a class="ghost" href="./preview-cadastros.html">Voltar</a>
        </div>

        <div class="main">
          <div class="field">
            <label>Nome</label>
            <div class="input">Shampoo Premium Pet Clean</div>
          </div>

          <div class="grid grid-top">
            <div class="field"><label>Tipo de Produto</label><div class="input">Higiene</div></div>
            <div class="inline-check"><span class="box"></span>Vacina</div>
            <div class="field"><label>Tributacao</label><div class="input">Padrao</div></div>
          </div>

          <div class="section">
            <h3>Informacoes do Produto</h3>
            <div class="grid grid-two">
              <div class="field"><label>Marca</label><div class="input">Pet Clean</div></div>
              <div class="field"><label>Fornecedor</label><div class="input">Distribuidora Animal</div></div>
            </div>
            <div class="grid grid-two">
              <div class="field"><label>Codigo de Barras</label><div class="input">7890001234567</div></div>
              <div class="field"><label>Validade</label><div class="input">12/12/2026</div></div>
            </div>
          </div>

          <div class="section">
            <h3>Estoque</h3>
            <div class="grid grid-stock">
              <div class="field"><label>Estoque Minimo</label><div class="input">5</div></div>
              <div class="field"><label>Estoque Atual</label><div class="input">18</div></div>
            </div>
          </div>

          <div class="section">
            <h3>Precificacao</h3>
            <div class="grid grid-four">
              <div class="field"><label>Unidade</label><div class="input">Unidade</div></div>
              <div class="field"><label>Preco de Custo</label><div class="input">25,00</div></div>
              <div class="field"><label>Margem</label><div class="input">35%</div></div>
              <div class="field"><label>Preco de Venda</label><div class="input">33,75</div></div>
            </div>
            <div class="grid grid-bottom">
              <div class="field"><label>Comissao</label><div class="input">5%</div></div>
              <div class="inline-check"><span class="box"></span>Comissao sobre o Lucro</div>
            </div>
          </div>

          <div class="section">
            <h3>Taxa bancaria</h3>
            <div class="grid grid-four">
              <div class="field"><label>Taxa de Debito</label><div class="input">1,99%</div></div>
              <div class="field"><label>Taxa de Credito</label><div class="input">3,49%</div></div>
              <div class="field"><label>Taxa de Parcelamento</label><div class="input">4,99%</div></div>
              <div class="field"><label>Taxa Pix</label><div class="input">0,99%</div></div>
            </div>
          </div>
        </div>

        <div class="footer" style="justify-content:flex-end;">
          <div class="actions">
            <div class="btn">Fechar</div>
          </div>
        </div>
      </div>
    </div>
  </body>
  </html>
