<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ViaPet Vacinas</title>
    <style>
      :root {
        --line: #e8ddf1;
        --text: #2f2835;
        --shadow: 0 24px 60px rgba(77, 53, 110, 0.14);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, sans-serif;
        background: linear-gradient(180deg, #f7f1fb 0%, #f3edf8 100%);
        color: var(--text);
      }
      .page {
        padding: 24px;
      }
      .subtabs {
        width: fit-content;
        display: flex;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #f4ebfb;
        margin-bottom: 18px;
      }
      .subtabs span {
        min-height: 46px;
        padding: 0 24px;
        display: inline-flex;
        align-items: center;
        border-right: 1px solid var(--line);
        color: #72687d;
      }
      .subtabs span:last-child { border-right: 0; }
      .subtabs .active {
        background: #d8f0ef;
        box-shadow: inset 0 -3px 0 #44b3aa;
        color: #3c5a58;
        font-weight: 700;
      }
      .board {
        border-radius: 16px;
        overflow: hidden;
        border: 1px solid var(--line);
        background: linear-gradient(180deg, #fcfafe 0%, #f8f3fd 100%);
        box-shadow: var(--shadow);
      }
      .toolbar {
        padding: 12px;
        display: flex;
        justify-content: space-between;
        gap: 14px;
      }
      .left, .right {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }
      .new-btn, .icon-btn, .search {
        min-height: 48px;
        border-radius: 8px;
        display: inline-flex;
        align-items: center;
      }
      .new-btn {
        padding: 0 18px;
        background: #4ea53d;
        color: white;
        font-weight: 700;
      }
      .search {
        min-width: 420px;
        padding: 0 14px;
        border: 1px solid #dad1e3;
        background: white;
        color: #766a83;
      }
      .icon-btn {
        padding: 0 16px;
        background: #eee7f5;
        color: #43384d;
        font-weight: 700;
      }
      .head {
        padding: 0 12px 12px;
        color: #5d5168;
        font-size: 14px;
      }
      .list {
        border-top: 1px solid #eadff3;
        background: white;
      }
      .row {
        min-height: 48px;
        padding: 0 12px;
        display: flex;
        align-items: center;
        color: #49414f;
        font-size: 16px;
        border-bottom: 1px solid #f1ebf8;
      }
      .row:nth-child(even) { background: #fefbff; }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="subtabs">
        <span>Vacinas</span>
        <span class="active">Planos Vacinais</span>
      </div>

      <section class="board">
        <div class="toolbar">
          <div class="left">
            <div class="new-btn">+ Novo Plano</div>
            <div class="search">Buscar plano vacinal</div>
            <div class="icon-btn">Imprimir</div>
            <div class="icon-btn">Excel</div>
          </div>
          <div class="right">
            <div class="icon-btn">Filtro</div>
            <div class="icon-btn">Excluir</div>
          </div>
        </div>

        <div class="head">Lista de Planos Vacinais</div>

        <div class="list">
          <div class="row">Canino Adulto</div>
          <div class="row">Canino Filhote</div>
          <div class="row">Canino Jovem (4 meses ou mais)</div>
          <div class="row">Felino Adulto</div>
          <div class="row">Felino Filhote</div>
          <div class="row">Felino Jovem</div>
        </div>
      </section>
    </div>
  </body>
  </html>
