<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="icon" type="image/png" href="/viapet-mascote.png" />
    <link rel="shortcut icon" type="image/png" href="/viapet-mascote.png" />
    <link rel="apple-touch-icon" href="/viapet-mascote.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#101826" />
    <title>ViaPet App</title>
    <meta
      name="description"
      content="Frontend do ViaPet com agenda operacional inspirada no VetBase."
    />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Inline script — NAO cacheado. Roda antes de qualquer outra coisa.
      // 1) Desregistra Service Workers antigos e limpa caches.
      // 2) Detecta versao antiga e forca hard reload (sem precisar Ctrl+Shift+R).
      (function () {
        try {
          var BUILD = "2026-05-05-whatsapp-connect-flow-v17";
          var stored = localStorage.getItem("viapet.build.tag");
          var needsReload = stored && stored !== BUILD;

          if ("serviceWorker" in navigator) {
            navigator.serviceWorker.getRegistrations().then(function (regs) {
              regs.forEach(function (r) { r.unregister(); });
            }).catch(function () {});
          }
          if (window.caches && window.caches.keys) {
            window.caches.keys().then(function (keys) {
              return Promise.all(keys.map(function (k) { return window.caches.delete(k); }));
            }).then(function () {
              if (needsReload) {
                localStorage.setItem("viapet.build.tag", BUILD);
                if (!sessionStorage.getItem("viapet.reloaded")) {
                  sessionStorage.setItem("viapet.reloaded", "1");
                  window.location.reload(true);
                }
              }
            }).catch(function () {});
          }
          // Salva tag se nao tinha nada
          if (!stored) localStorage.setItem("viapet.build.tag", BUILD);
        } catch (e) {}
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
  </html>
