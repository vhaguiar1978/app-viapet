<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Configurar Perfil</title>
    <style>
      body{margin:0;font-family:"Segoe UI",Tahoma,sans-serif;background:rgba(0,0,0,.18)}
      .modal{width:1100px;min-height:700px;margin:18px auto;padding:22px 36px 30px;border-radius:10px;background:#fff;border:1px solid #e8ddf1;display:grid;gap:22px}
      h1{margin:12px 0 0;font-size:48px;font-weight:500}
      .tabs{display:inline-flex;border:1px solid #e8ddf1;border-radius:8px;overflow:hidden;background:#f6f1fb;width:fit-content}
      .tab{min-height:54px;padding:0 28px;display:inline-flex;align-items:center;border-right:1px solid #e8ddf1;color:#7a7184;font-size:18px}
      .tab.active{background:#fff;box-shadow:inset 0 -3px 0 #4aa255;color:#444}
      .stack{display:grid;gap:18px}
      .card{padding:18px;border:1px solid #d8cfdf;border-radius:8px;display:grid;gap:16px}
      .inline{grid-template-columns:1fr auto;align-items:center}
      .color-line{display:flex;align-items:center;gap:12px}
      .swatch{width:48px;height:22px;border-radius:4px;background:#ca9aea}
      .grid{display:grid;grid-template-columns:repeat(10,44px);width:fit-content;border-radius:6px;overflow:hidden;box-shadow:0 6px 16px rgba(63,47,88,.16)}
      .grid span{width:44px;height:44px;display:block}
      .check{display:inline-flex;align-items:center;gap:12px;color:#46a24f;font-size:18px}
      .box{width:24px;height:24px;border:2px solid #8c8c8c;border-radius:2px;display:inline-block}
      .soft{min-height:46px;padding:0 24px;border-radius:4px;background:#6c8595;color:#fff;border:0;font-size:18px;font-weight:700}
      .valid{margin:10px 0 0;color:#44a451;font-size:18px;font-weight:600}
      .footer{display:flex;justify-content:flex-end}
      .green{min-height:54px;padding:0 34px;border-radius:4px;background:#49a34e;color:#fff;border:0;font-size:20px;font-weight:700}
    </style>
  </head>
  <body>
    <div class="modal">
      <h1>Configurar</h1>
      <div class="tabs"><span class="tab active">Perfil</span><span class="tab">Recursos</span><span class="tab">Agenda</span><span class="tab">Impressão</span><span class="tab">Conta</span></div>
      <div class="stack">
        <section class="card">
          <div class="color-line"><span>Cor Selecionada:</span><div class="swatch"></div></div>
          <div class="grid">
            <span style="background:#7ad93a"></span><span style="background:#587de1"></span><span style="background:#9fb6ea"></span><span style="background:#48c4d0"></span><span style="background:#7fd9b4"></span><span style="background:#53c047"></span><span style="background:#ffe066"></span><span style="background:#ffb870"></span><span style="background:#ff7f73"></span><span style="background:#ef2028"></span>
            <span style="background:#ca9aea"></span><span style="background:#d1d1d1"></span><span style="background:#7e2e2e"></span><span style="background:#417fe5"></span><span style="background:#7d4e8f"></span><span style="background:#be443f"></span><span style="background:#cf8558"></span><span style="background:#e54b9c"></span><span style="background:#60b4df"></span><span style="background:#12748d"></span>
          </div>
          <label class="check"><span class="box"></span><span>Tema escuro</span></label>
        </section>
        <section class="card inline"><strong>Assinatura nas receitas</strong><button class="soft">Adicionar Assinatura</button></section>
        <section class="card inline"><div><strong>Validade do VetBase</strong><p class="valid">Validade do VetBase: 16.04.2026</p></div><button class="soft">Renovar</button></section>
      </div>
      <div class="footer"><button class="green">Fechar</button></div>
    </div>
  </body>
</html>
