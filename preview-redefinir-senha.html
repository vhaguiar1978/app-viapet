<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redefinir Senha</title>
    <style>
      body{margin:0;font-family:"Segoe UI",Tahoma,sans-serif;background:rgba(38,28,51,.22)}
      .overlay{min-height:100vh;display:grid;place-items:center;padding:24px}
      .card{width:min(520px,100%);padding:38px 46px 28px;border-radius:14px;background:#fff;box-shadow:0 28px 60px rgba(45,31,69,.2);border:1px solid #e8ddf1;display:grid;gap:26px}
      h2{margin:0;text-align:center;font-size:28px}
      .fields{display:grid;gap:18px}
      .field{min-height:48px;padding:0 14px;border-radius:8px;border:1px solid #d8cfdf;display:flex;align-items:center;color:#766a83;font-size:18px}
      .actions{display:flex;justify-content:center;gap:12px}
      .ok{min-height:54px;padding:0 46px;border-radius:6px;background:#49a34e;color:#fff;border:0;font-size:18px;font-weight:700}
      .cancel{min-height:54px;padding:0 28px;border-radius:6px;background:#fff;border:1px solid #ddd2e8;font-size:18px;text-transform:uppercase}
    </style>
  </head>
  <body>
    <div class="overlay">
      <div class="card">
        <h2>Redefinir Senha</h2>
        <div class="fields">
          <div class="field">Senha Atual</div>
          <div class="field">Nova senha</div>
          <div class="field">Repita a nova senha</div>
        </div>
        <div class="actions">
          <button class="ok">OK</button>
          <button class="cancel">Cancelar</button>
        </div>
      </div>
    </div>
  </body>
</html>
